{% extends "layout.html" %}

{% block title %}Catálogo de Livros{% endblock %}

{% block content %}
<div class="w3-container w3-teal w3-padding-24">
    <div class="page-wrap">
        <h2><i class="fa fa-book w3-margin-right"></i>Catálogo Temporal</h2>
        <p class="w3-margin-0">Total de livros: <b>{{ total }}</b></p>
    </div>
</div>

<div class="w3-container w3-padding-32">
    <div class="page-wrap">
        <table class="w3-table-all w3-hoverable w3-card-4">
            <thead>
                <tr class="w3-light-grey">
                    <th>Título</th>
                    <th>Tipo</th>
                    <th>Autor</th>
                    <th>País</th>
                </tr>
            </thead>
            <tbody>
                {% for livro in livros %}
                <tr>
                    <td>
                        <a class="w3-text-teal card-link" href="/livro/{{ livro.id }}"><b>{{ livro.titulo }}</b></a>
                    </td>
                    <td><span class="w3-tag w3-round {{ livro.color }}">{{ livro.tipo }}</span></td>
                    <td>{{ livro.autor }}</td>
                    <td>{{ livro.pais }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
