{% extends "layout.html" %}

{% block title %}Linhas Temporais{% endblock %}

{% block content %}
<div class="w3-container w3-teal w3-padding-24">
    <div class="page-wrap">
        <h2><i class="fa fa-clock-o w3-margin-right"></i>Linhas Temporais</h2>
        <p class="w3-margin-0">Total de linhas: <b>{{ total }}</b></p>
    </div>
</div>

<div class="w3-container w3-padding-32">
    <div class="page-wrap">
        <table class="w3-table-all w3-hoverable w3-card-4">
            <thead>
                <tr class="w3-light-grey">
                    <th>ID</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody>
                {% for linha in linhas %}
                <tr>
                    <td>
                        <a class="w3-text-teal card-link" href="/linha/{{ linha.id }}"><b>{{ linha.id }}</b></a>
                    </td>
                    <td>
                        <span class="w3-tag w3-round {{ linha.color }}">{{ linha.tipo }}</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
